# ArchiveTune — Docker Compose
# Runs the backend + frontend together. The frontend connects to the backend
# via the Docker network.
#
# Usage:
#   docker compose up --build
#
# Then open http://localhost:1420 in your browser.
#
# API keys are OPTIONAL. To add them, copy .env.example to .env first:
#   cp .env.example .env
# (the .env file is picked up automatically if present).
#
# NOTE: Audio playback (mpv) requires access to the host's audio system.
# On Linux with PulseAudio, uncomment the volume mounts below.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archivetune-backend
    ports:
      - "8000:8000"
    # API keys are optional. Docker Compose automatically reads a .env file in
    # this directory for ${VAR} substitution if present (and does NOT error if
    # it's absent). The :- defaults keep every key optional.
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DOWNLOAD_DIR=/app/downloads
      - DATABASE_PATH=/app/data/archivetune.db
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - LASTFM_USERNAME=${LASTFM_USERNAME:-}
      - LASTFM_PASSWORD=${LASTFM_PASSWORD:-}
      - LISTENBRAINZ_TOKEN=${LISTENBRAINZ_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GCP_TRANSLATION_API_KEY=${GCP_TRANSLATION_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - archivetune-data:/app/downloads
      - archivetune-db:/app/data
      # Uncomment below for audio playback via PulseAudio on Linux:
      # - /run/user/1000/pulse:/run/user/1000/pulse
      # - ~/.config/pulse/cookie:/root/.config/pulse/cookie
    # Uncomment below for PulseAudio:
    # environment:
    #   - PULSE_SERVER=unix:/run/user/1000/pulse/native
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: archivetune-frontend
    ports:
      - "1420:1420"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  archivetune-data:
  archivetune-db:
