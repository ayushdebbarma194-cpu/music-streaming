# nginx config for serving the ArchiveTune SPA.
# Falls back to index.html so client-side routes (e.g. /search, /now-playing)
# resolve correctly on direct navigation/refresh.

server {
    listen 1420;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; never cache the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip text assets for faster loads.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
