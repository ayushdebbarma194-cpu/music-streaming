server {
    listen 1420 default_server;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any route that doesn't match a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets (filenames contain content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 512;
}
